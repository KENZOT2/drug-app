<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏥 藥品查詢系統 雲端資料版</title>

    <!-- ✅ PWA & iOS 專用標籤開始 -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d6efd">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="藥品查詢">
    <link rel="apple-touch-icon" href="icon-192x192.png">
    <!-- ✅ PWA & iOS 專用標籤結束 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css"
        rel="stylesheet" />
    <style>
        body {
            background-color: #f0f2f5;
            font-family: "Microsoft JhengHei", sans-serif;
            font-size: 1rem;
        }

        .main-container {
            width: 95%;
            max-width: 92rem;
            margin: 1.25rem auto;
            background: white;
            padding: 1.5rem;
            border-radius: 1rem;
            box-shadow: 0 0.25rem 1.25rem rgba(0, 0, 0, 0.08);
            position: relative;
        }

        #loader-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            z-index: 1050;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 1rem;
        }

        /* 標題列工具按鈕 */
        .header-tools {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .tool-link {
            font-size: 0.8rem;
            font-weight: bold;
            padding: 0.3rem 0.75rem;
            border-radius: 3rem;
            text-decoration: none;
            border: 0.06rem solid #dee2e6;
            color: #555;
            background: #fff;
            transition: all 0.2s ease;
        }

        .tool-link:hover {
            background-color: #f8f9fa;
            border-color: #0d6efd;
            color: #0d6efd;
        }

        .filter-panel {
            background-color: #f8f9fa;
            padding: 1.1rem;
            border-radius: 0.6rem;
            margin-bottom: 1.25rem;
            border: 0.06rem solid #dee2e6;
            border-left: 0.4rem solid #0d6efd;
        }

        /* 篩選按鈕樣式 */
        .btn-filter-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
        }

        .btn-filter {
            font-size: 0.85rem;
            padding: 0.25rem 0.8rem;
            border-radius: 0.5rem;
            font-weight: bold;
            border: 0.06rem solid #ced4da;
            background-color: #fff;
            color: #495057;
            transition: all 0.2s;
        }

        .btn-filter:hover {
            background-color: #e9ecef;
        }

        .btn-filter.active {
            background-color: #0d6efd;
            color: #fff;
            border-color: #0d6efd;
        }

        table thead th {
            background-color: #34495e !important;
            color: white !important;
            text-align: left !important;
            padding: 0.75rem 0.5rem !important;
        }

        .drug-action-text {
            color: #333333 !important;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        #drugTable td {
            vertical-align: middle;
            word-wrap: break-word;
            padding: 0.75rem 0.5rem !important;
        }

        .badge-date {
            font-size: 0.75rem;
            background-color: #f1f3f5;
            color: #adb5bd;
            border-radius: 3rem;
            padding: 0.25rem 0.75rem;
        }

        .detail-link {
            color: #0d6efd;
            font-weight: bold;
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="main-container">
        <div id="loader-wrapper" role="status" aria-live="polite">
            <div class="spinner-border text-primary mb-3" style="width: 3rem; height: 3rem;"></div>
            <h5 class="text-secondary">🏥 雲端資料同步中...</h5>
        </div>

        <header class="mb-4 border-bottom pb-3 d-flex justify-content-between align-items-start">
            <div>
                <h1 class="h3 mb-0" style="color: #2c3e50; font-weight: bold;">💊 藥品查詢系統 <small
                        class="text-muted fs-6">雲端資料版 v2.9.6</small></h1>
                <div id="display-date" class="badge-date">資料生成時間：載入中...</div>
            </div>
            <nav class="header-tools" aria-label="外部工具連結">
                <a href="https://mcp.fda.gov.tw/im" target="_blank" class="tool-link"
                    title="開啟 FDA 仿單查詢系統 (另開新視窗)">仿單查詢</a>
                <a href="https://www.nhi.gov.tw/ch/np-2505-1.html" target="_blank" class="tool-link"
                    title="開啟健保藥品給付規定 (另開新視窗)">藥品給付</a>
                <a href="https://info.nhi.gov.tw/INAE3000/INAE3000S01" target="_blank" class="tool-link"
                    title="開啟健保用藥品項查詢 (另開新視窗)">健保用藥</a>
                <a href="https://medcloud2.nhi.gov.tw/imu/imue1000" target="_blank" class="tool-link"
                    title="開啟雲端藥歷系統 (另開新視窗)">雲端藥歷</a>
                <button class="btn btn-sm btn-primary ms-2" style="border-radius: 3rem; font-size: 0.75rem;"
                    onclick="location.reload()" aria-label="重新整理頁面">🔄 重整</button>
            </nav>
        </header>

        <div class="filter-panel">
            <div class="row g-3">
                <div class="col-md-3">
                    <label for="globalSearch" class="fw-bold small mb-1">🔍 關鍵字搜尋</label>
                    <input type="text" id="globalSearch" class="form-control form-control-sm" placeholder="代碼、簡碼或藥名...">
                </div>
                <div class="col-md-3">
                    <label for="select-atc" class="fw-bold small mb-1">🧬 ATC 搜尋</label>
                    <select id="select-atc" class="form-select"></select>
                </div>
                <div class="col-md-3">
                    <label class="fw-bold small mb-1">💊 劑型篩選</label>
                    <div id="dosage-btn-group" class="btn-filter-group" role="group"></div>
                </div>
                <div class="col-md-3">
                    <label class="fw-bold small mb-1">🚦 狀態篩選</label>
                    <div id="status-btn-group" class="btn-filter-group" role="group"></div>
                </div>
            </div>
        </div>

        <div id="table-content" style="display:none;">
            <div class="table-responsive">
                <table id="drugTable" class="table table-hover align-middle" style="width: 100%;">
                    <thead>
                        <tr>
                            <th style="width: 8%;">醫令代碼</th>
                            <th style="width: 30%;">藥品名稱 (英/中)</th>
                            <th style="width: 5%;">劑型</th>
                            <th style="width: 5%;">狀態</th>
                            <th style="width: 10%;">ATC 代碼</th>
                            <th style="width: 35%;">藥物作用</th>
                            <th style="width: 7%;">資料庫</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <script>
        // ✅ 這是 PWA 靈魂：註冊 Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker 註冊成功！', reg))
                    .catch(err => console.log('Service Worker 註冊失敗：', err));
            });
        }

        $(document).ready(function () {
            const API_URL = 'https://script.google.com/macros/s/AKfycbz5YDlqhcmUB6gShlKunB6EjT5CP6ML4udQJJRR7tIb2-7kMmhrOcR5RxHik-NBpJw0/exec';

            fetch(API_URL).then(res => res.json()).then(data => {
                if (data.error) throw new Error(data.error);
                $('#display-date').text('資料生成時間：' + (data.date || '未知'));
                const atcSelect = $('#select-atc');
                atcSelect.empty().append('<option value="">全部 ATC 分類</option>');
                data.atc.forEach(item => {
                    atcSelect.append('<option value="' + item.c + '">' + item.l + ' (' + item.c + ')</option>');
                });
                atcSelect.select2({ theme: 'bootstrap-5', width: '100%' });

                const decodedDrugs = data.drugs.map(item => ({ "a": item.a, "b": item.b, "c": item.c, "d": item.d, "e": item.e, "f": item.f, "g": item.g }));
                initTable(decodedDrugs);
                $('#loader-wrapper').fadeOut();
                $('#table-content').fadeIn();
            }).catch(err => {
                $('#loader-wrapper h5').text('連線失敗。').addClass('text-danger');
            });

            function initTable(drugData) {
                var table = $('#drugTable').DataTable({
                    data: drugData,
                    "pageLength": 15, "dom": 'rtip', "deferRender": true, "order": [],
                    "language": { "url": "//cdn.datatables.net/plug-ins/1.13.4/i18n/zh-HANT.json" },
                    "columns": [
                        { data: 'a', className: 'text-start' },
                        {
                            data: null, render: function (d, t, row) {
                                return '<b>' + (row.b || "") + '</b><br><small class="text-secondary">' + (row.c || "") + '</small>';
                            }
                        },
                        { data: 'e', render: function (val) { return val ? val.substring(0, 2) : "其他"; }, className: 'text-center' },
                        {
                            data: 'd', render: function (val) {
                                var cls = val === '正常' ? 'bg-success' : 'bg-secondary';
                                return '<span class="badge ' + cls + '">' + (val || "未知") + '</span>';
                            }, className: 'text-center'
                        },
                        { data: 'f', className: 'text-start' },
                        { data: 'g', defaultContent: "", className: 'drug-action-text' },
                        {
                            data: null, render: function (d, t, row) {
                                return '<a href="http://hq-sso2-nvm/ESMC/Home/DetailPage?odr_code=' + row.a + '" target="_blank" class="detail-link" title="查詢代碼 ' + row.a + ' 詳細資訊">詳細</a>';
                            }, className: 'text-center'
                        }
                    ]
                });

                // 💡 建立按鈕組
                setupFilterButtons(table, 2, "#dosage-btn-group", ["全部", "口服", "外用", "針劑", "眼用"], "全部");
                setupFilterButtons(table, 3, "#status-btn-group", ["全部", "正常", "停用", "等待啟用", "缺料"], "正常");

                $('#globalSearch').on('keyup', function () { table.search(this.value).draw(); });
                $('#select-atc').on('change', function () {
                    var val = $(this).val();
                    table.column(4).search(val ? '^' + $.fn.dataTable.util.escapeRegex(val) : '', true, false).draw();
                });
            }

            function setupFilterButtons(api, colIdx, containerId, list, defaultVal) {
                const container = $(containerId);
                list.forEach(item => {
                    const btn = $('<button type="button" class="btn-filter"></button>')
                        .text(item)
                        .attr('aria-pressed', item === defaultVal)
                        .toggleClass('active', item === defaultVal)
                        .on('click', function () {
                            $(this).parent().find('.btn-filter').removeClass('active').attr('aria-pressed', 'false');
                            $(this).addClass('active').attr('aria-pressed', 'true');
                            let searchVal = item === "全部" ? "" : item;
                            api.column(colIdx).search(searchVal ? '^' + searchVal + '$' : '', true, false).draw();
                        });
                    container.append(btn);
                });
                if (defaultVal !== "全部") {
                    api.column(colIdx).search('^' + defaultVal + '$', true, false).draw();
                }
            }
        });
    </script>
</body>

</html>
