<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💊 藥物知識測驗</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');

        :root {
            --primary: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #0f172a;
            --card: #1e293b;
            --border: #334155;
            --text: #e2e8f0;
            --muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Noto Sans TC', "Microsoft JhengHei", sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        /* ── 載入 ── */
        #loading-screen {
            text-align: center;
        }

        .spinner {
            width: 56px;
            height: 56px;
            border: 6px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1.5rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── 模式選擇 ── */
        #mode-screen {
            width: 100%;
            max-width: 560px;
            display: none;
            text-align: center;
        }

        #mode-screen h2 {
            font-size: 1.8rem;
            font-weight: 900;
            margin-bottom: 0.5rem;
        }

        #mode-screen p {
            color: var(--muted);
            margin-bottom: 2rem;
        }

        .mode-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .mode-card {
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 1rem;
            padding: 1.75rem 1.25rem;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }

        .mode-card:hover {
            border-color: var(--primary);
            background: #1e3a5f;
        }

        .mode-card .icon {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
        }

        .mode-card h3 {
            font-size: 1rem;
            font-weight: 900;
            margin-bottom: 0.4rem;
        }

        .mode-card p {
            font-size: 0.82rem;
            color: var(--muted);
            line-height: 1.5;
        }

        .back-link {
            display: block;
            margin-top: 1.25rem;
            color: var(--muted);
            font-size: 0.85rem;
            text-decoration: none;
        }

        .back-link:hover {
            color: var(--text);
        }

        /* ── 遊戲主畫面 ── */
        #game-screen {
            width: 100%;
            max-width: 720px;
            display: none;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .stat-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 0.4rem 1rem;
            font-size: 0.85rem;
            color: var(--muted);
        }

        .stat-box span {
            font-weight: 900;
            font-size: 1.1rem;
            color: var(--text);
        }

        #timer-bar-wrap {
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            margin-bottom: 1.5rem;
            overflow: hidden;
        }

        #timer-bar {
            height: 100%;
            background: var(--primary);
            transition: width 0.1s linear;
        }

        .question-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.75rem 2rem;
            margin-bottom: 1.25rem;
        }

        .q-label {
            font-size: 0.75rem;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .q-text {
            font-size: 1.1rem;
            line-height: 1.7;
            font-weight: 500;
        }

        .q-hint {
            font-size: 0.78rem;
            color: var(--muted);
            margin-top: 0.6rem;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .opt-btn {
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 0.75rem;
            padding: 0.9rem 1rem;
            color: var(--text);
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.18s;
            text-align: left;
            font-family: inherit;
            line-height: 1.4;
        }

        .opt-btn:hover:not(:disabled) {
            border-color: var(--primary);
            background: #1e3a5f;
        }

        .opt-btn.correct {
            border-color: var(--success);
            background: #064e3b;
            color: #6ee7b7;
        }

        .opt-btn.wrong {
            border-color: var(--danger);
            background: #450a0a;
            color: #fca5a5;
        }

        .opt-btn:disabled {
            cursor: default;
            opacity: 0.7;
        }

        #result-area {
            background: var(--card);
            border-radius: 0.75rem;
            padding: 1rem 1.25rem;
            margin-bottom: 1.25rem;
            display: none;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        #result-area.correct {
            border-left: 4px solid var(--success);
        }

        #result-area.wrong {
            border-left: 4px solid var(--danger);
        }

        #next-btn {
            width: 100%;
            padding: 0.85rem;
            border-radius: 0.75rem;
            background: var(--primary);
            color: white;
            border: none;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: opacity 0.2s;
            display: none;
        }

        #next-btn:hover {
            opacity: 0.85;
        }

        /* ── 最終結果 ── */
        #result-screen {
            width: 100%;
            max-width: 480px;
            text-align: center;
            display: none;
        }

        .result-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 1.25rem;
            padding: 2.5rem 2rem;
        }

        .result-emoji {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .result-score {
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--primary);
        }

        .result-sub {
            color: var(--muted);
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .restart-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0.75rem;
            padding: 0.85rem 1.5rem;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            margin: 0.3rem;
            transition: opacity 0.2s;
        }

        .restart-btn:hover {
            opacity: 0.85;
        }

        .restart-btn.outline {
            background: transparent;
            border: 2px solid var(--border);
            color: var(--muted);
        }

        .restart-btn.outline:hover {
            border-color: var(--text);
            color: var(--text);
        }

        @media(max-width: 540px) {
            .options-grid {
                grid-template-columns: 1fr;
            }

            .mode-cards {
                grid-template-columns: 1fr;
            }

            .question-card {
                padding: 1.25rem;
            }
        }
    </style>
</head>

<body>

    <!-- 載入畫面 -->
    <div id="loading-screen">
        <div class="spinner"></div>
        <h2 style="font-size:1.8rem;margin-bottom:0.5rem;">💊 藥物知識測驗</h2>
        <p style="color:var(--muted)">正在載入藥品資料...</p>
    </div>

    <!-- 模式選擇畫面 -->
    <div id="mode-screen">
        <h2>💊 藥物知識測驗</h2>
        <p>選擇想要練習的題型</p>
        <div class="mode-cards">
            <div class="mode-card" onclick="startGame(1)">
                <div class="icon">🔍</div>
                <h3>模式一：猜藥名</h3>
                <p>看藥物作用描述，從 4 個選項中選出正確藥名。</p>
            </div>
            <div class="mode-card" onclick="startGame(2)">
                <div class="icon">🚦</div>
                <h3>模式二：找正常藥</h3>
                <p>相同 ATC 分類中，哪一個藥品目前狀態為「正常」可開立？</p>
            </div>
        </div>
        <a href="index.html" class="back-link">← 回到藥品查詢系統</a>
    </div>

    <!-- 遊戲主畫面 -->
    <div id="game-screen">
        <div class="top-bar">
            <div class="stat-box">題目 <span id="q-num">1</span> / <span id="q-total">10</span></div>
            <div class="stat-box">✅ 答對 <span id="score">0</span></div>
            <div class="stat-box">🔥 連尾 <span id="streak">0</span></div>
            <div class="stat-box">⏱ <span id="timer-text">15</span>s</div>
        </div>
        <div id="timer-bar-wrap">
            <div id="timer-bar" style="width:100%"></div>
        </div>
        <div class="question-card">
            <div class="q-label" id="q-label">模式一：看藥物作用→猜藥名</div>
            <div class="q-text" id="q-text"></div>
            <div class="q-hint" id="q-hint"></div>
        </div>
        <div class="options-grid" id="options-grid"></div>
        <div id="result-area"></div>
        <button id="next-btn" onclick="nextQuestion()">下一題 →</button>
    </div>

    <!-- 最終結果畫面 -->
    <div id="result-screen">
        <div class="result-card">
            <div class="result-emoji" id="result-emoji">🎉</div>
            <div class="result-score" id="result-score">0 / 10</div>
            <div class="result-sub" id="result-sub">答題完畢！</div>
            <button class="restart-btn" onclick="startGame(currentMode)">再玩一次</button>
            <button class="restart-btn outline" onclick="goModeSelect()">換模式</button>
            <a href="index.html" class="back-link">← 回到藥品查詢系統</a>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbz5YDlqhcmUB6gShlKunB6EjT5CP6ML4udQJJRR7tIb2-7kMmhrOcR5RxHik-NBpJw0/exec';
        const CACHE_KEY = 'ym_drug_v297';
        const TOTAL_Q = 10;
        const TIME_LIMIT = 15;

        var allDrugs = [];   // 全部藥品
        var drugsWithAction = []; // 有藥物作用的藥品（模式一用）
        var normalDrugs = [];     // 狀態正常的藥品（模式二用）
        var abnormalDrugs = [];   // 狀態非正常的藥品（模式二干擾選項）

        var questions = [];
        var currentIdx = 0;
        var score = 0;
        var streak = 0;
        var currentMode = 1;
        var timerInterval = null;
        var timeLeft = TIME_LIMIT;

        // ── 載入資料 ──────────────────────────────────────
        function loadData() {
            try {
                var cached = JSON.parse(localStorage.getItem(CACHE_KEY));
                if (cached && cached.data && cached.data.drugs && cached.data.drugs.length > 0) {
                    processData(cached.data.drugs);
                    showModeSelect();
                    return;
                }
            } catch (e) { }

            fetch(API_URL).then(function (r) { return r.json(); }).then(function (data) {
                if (data.error) throw new Error(data.error);
                try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data: data })); } catch (e) { }
                processData(data.drugs);
                showModeSelect();
            }).catch(function () {
                document.getElementById('loading-screen').innerHTML =
                    '<h2 style="color:#ef4444;">⚠️ 載入失敗</h2><p style="color:var(--muted)">請重新整理頁面</p>';
            });
        }

        function processData(drugs) {
            allDrugs = drugs;
            drugsWithAction = drugs.filter(function (d) { return d.g && d.g.toString().trim() !== ''; });
            normalDrugs = drugs.filter(function (d) { return d.d && d.d.toString().trim() === '正常'; });
            abnormalDrugs = drugs.filter(function (d) { return d.d && d.d.toString().trim() !== '正常'; });
        }

        // ── 模式選擇 ──────────────────────────────────────
        function showModeSelect() {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'none';
            document.getElementById('mode-screen').style.display = 'block';
        }

        function goModeSelect() {
            clearInterval(timerInterval);
            showModeSelect();
        }

        // ── 開始遊戲 ──────────────────────────────────────
        function startGame(mode) {
            currentMode = mode;
            score = 0; streak = 0; currentIdx = 0;

            if (mode === 1) {
                // 模式一：需要有藥物作用的藥品
                if (drugsWithAction.length < 4) { alert('藥物作用資料不足，無法開始！'); return; }
                questions = shuffle(drugsWithAction).slice(0, TOTAL_Q);
            } else {
                // 模式二：需要有正常 + 非正常藥品
                if (normalDrugs.length < 1 || abnormalDrugs.length < 3) { alert('狀態資料不足，無法開始！'); return; }
                questions = buildMode2Questions(TOTAL_Q);
            }

            document.getElementById('q-total').textContent = questions.length;
            document.getElementById('mode-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('q-label').textContent =
                mode === 1 ? '模式一 ─ 看藥物作用 → 猜藥名' : '模式二 ─ 找出狀態「正常」的藥品';

            showQuestion();
        }

        // ── 模式二：建立題組 ──────────────────────────────
        function buildMode2Questions(total) {
            var qs = [];
            var shuffledNormal = shuffle(normalDrugs);

            for (var i = 0; i < Math.min(total, shuffledNormal.length); i++) {
                var correct = shuffledNormal[i];
                // 優先從同 ATC 前 3 碼找干擾項
                var atcPrefix = correct.f ? correct.f.toString().substring(0, 3) : '';
                var sameAtc = abnormalDrugs.filter(function (d) {
                    return atcPrefix && d.f && d.f.toString().startsWith(atcPrefix);
                });
                // 同 ATC 不夠就從全部非正常藥品補
                var pool = sameAtc.length >= 3 ? sameAtc : abnormalDrugs;
                var distractors = shuffle(pool).slice(0, 3);
                qs.push({ correct: correct, distractors: distractors, atcPrefix: atcPrefix });
            }
            return qs;
        }

        // ── 顯示題目 ──────────────────────────────────────
        function showQuestion() {
            var q = questions[currentIdx];
            document.getElementById('q-num').textContent = currentIdx + 1;
            document.getElementById('score').textContent = score;
            document.getElementById('streak').textContent = streak;
            document.getElementById('result-area').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';

            var grid = document.getElementById('options-grid');
            grid.innerHTML = '';

            if (currentMode === 1) {
                // ── 模式一 ──
                document.getElementById('q-text').textContent = q.g;
                document.getElementById('q-hint').textContent = 'ATC：' + (q.f || '—');
                var others = shuffle(drugsWithAction.filter(function (d) { return d.a !== q.a; })).slice(0, 3);
                var opts = shuffle([q].concat(others));
                opts.forEach(function (opt) {
                    var btn = makeOptBtn(
                        '<b>' + (opt.b || opt.a) + '</b>' + (opt.c ? '<br><span style="font-size:0.8rem;font-weight:400;color:var(--muted)">' + opt.c + '</span>' : ''),
                        function () { checkAnswer(opt.a === q.a, q, btn, 1); }
                    );
                    grid.appendChild(btn);
                });
            } else {
                // ── 模式二 ──
                var correct = q.correct;
                var distractors = q.distractors;
                var atcLabel = q.atcPrefix ? '（ATC 前綴：' + q.atcPrefix + '）' : '';
                document.getElementById('q-text').textContent = '以下哪個藥品目前狀態為「正常」可開立？';
                document.getElementById('q-hint').textContent = atcLabel;

                var opts2 = shuffle([correct].concat(distractors));
                opts2.forEach(function (opt) {
                    var statusText = opt.d ? '【' + opt.d + '】' : '';
                    var btn = makeOptBtn(
                        '<b>' + (opt.b || opt.a) + '</b> ' + (opt.c ? '<br><span style="font-size:0.8rem;font-weight:400;color:var(--muted)">' + opt.c + '</span>' : ''),
                        function () { checkAnswer(opt.a === correct.a, q, btn, 2); }
                    );
                    grid.appendChild(btn);
                });
            }

            startTimer();
        }

        function makeOptBtn(html, onClick) {
            var btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerHTML = html;
            btn.onclick = onClick;
            return btn;
        }

        // ── 計時器 ────────────────────────────────────────
        function startTimer() {
            clearInterval(timerInterval);
            timeLeft = TIME_LIMIT;
            updateTimerUI();
            timerInterval = setInterval(function () {
                timeLeft--;
                updateTimerUI();
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    streak = 0;
                    var q = questions[currentIdx];
                    showResult(false, q, currentMode);
                }
            }, 1000);
        }

        function updateTimerUI() {
            document.getElementById('timer-text').textContent = timeLeft;
            document.getElementById('timer-bar').style.width = (timeLeft / TIME_LIMIT * 100) + '%';
            var bar = document.getElementById('timer-bar');
            bar.style.background = timeLeft > 8 ? 'var(--primary)' : timeLeft > 4 ? 'var(--warning)' : 'var(--danger)';
        }

        // ── 答題 ──────────────────────────────────────────
        function checkAnswer(isCorrect, q, btn, mode) {
            clearInterval(timerInterval);
            document.querySelectorAll('.opt-btn').forEach(function (b) { b.disabled = true; });
            if (isCorrect) { btn.classList.add('correct'); } else { btn.classList.add('wrong'); }
            showResult(isCorrect, q, mode);
        }

        function showResult(isCorrect, q, mode) {
            // 找到正確答案按鈕並標色
            var correctName = mode === 1 ? (q.b || q.a) : (q.correct.b || q.correct.a);
            document.querySelectorAll('.opt-btn').forEach(function (b) {
                var bName = b.querySelector('b');
                if (bName && bName.textContent.trim() === correctName.trim()) b.classList.add('correct');
                b.disabled = true;
            });

            if (isCorrect) { score++; streak++; } else { streak = 0; }
            document.getElementById('score').textContent = score;
            document.getElementById('streak').textContent = streak;

            var area = document.getElementById('result-area');
            area.className = isCorrect ? 'correct' : 'wrong';

            if (mode === 1) {
                area.innerHTML = (isCorrect ? '✅ 正確！' : '❌ 答錯了！') +
                    '<br><b>' + (q.b || q.a) + '</b>' + (q.c ? '（' + q.c + '）' : '') +
                    '<br><span style="color:var(--muted);font-size:0.82rem;">' + (q.g || '') + '</span>';
            } else {
                var c = q.correct;
                area.innerHTML = (isCorrect ? '✅ 正確！' : '❌ 答錯了！') +
                    '<br>正常可開立的藥品是：<b>' + (c.b || c.a) + '</b>' + (c.c ? '（' + c.c + '）' : '') +
                    (c.g ? '<br><span style="color:var(--muted);font-size:0.82rem;">' + c.g + '</span>' : '');
            }

            area.style.display = 'block';
            document.getElementById('next-btn').style.display = 'block';
            document.getElementById('next-btn').textContent =
                currentIdx + 1 < questions.length ? '下一題 →' : '查看結果 🏆';
        }

        // ── 換題 ──────────────────────────────────────────
        function nextQuestion() {
            currentIdx++;
            if (currentIdx >= questions.length) { showFinalResult(); }
            else { showQuestion(); }
        }

        // ── 最終結果 ──────────────────────────────────────
        function showFinalResult() {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            var pct = score / questions.length;
            var emoji = pct >= 0.9 ? '🏆' : pct >= 0.7 ? '🎉' : pct >= 0.5 ? '😊' : '💪';
            var msg = pct >= 0.9 ? '完美！藥師天花板！' : pct >= 0.7 ? '優秀！繼續保持！' : pct >= 0.5 ? '不錯，還可以更好！' : '加油練習，你做得到！';
            document.getElementById('result-emoji').textContent = emoji;
            document.getElementById('result-score').textContent = score + ' / ' + questions.length;
            document.getElementById('result-sub').textContent = msg;
        }

        // ── 工具 ──────────────────────────────────────────
        function shuffle(arr) {
            var a = arr.slice();
            for (var i = a.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var t = a[i]; a[i] = a[j]; a[j] = t;
            }
            return a;
        }

        // 啟動
        loadData();
    </script>
</body>

</html>
